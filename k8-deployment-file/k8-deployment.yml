apiVersion: apps/v1
kind: Deployment
metadata:
  name: particle41-assessment
spec:
  replicas: 2
  selector:
      matchLabels:
          app: particle41

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 50%

  template:
    metadata:
      labels:
        app: particle41
    spec:
      containers:
        - name: simple-time-deployment
          image: tapashdebdocker/particle41:latest
          ports:
            - containerPort: 8000 
          resources:
            requests:
              cpu: "1m"
              memory: "2Gi"
            limits:
              cpu: "2m"
              memory: "4Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: simple-time-service
spec:
  type: NodePort
  selector:
    app: particle41
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000      
      nodePort: 11200       